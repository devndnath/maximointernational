<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        .hero-wrapper {
            position: relative;
            width: 100%;
            height: 90vh;
            /* Professional hero height */
            overflow: hidden;
            background-color: #000;
        }

        /* Static Content Overlay */
        .hero-static-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            pointer-events: none;
            /* Allows arrows/pagination to be clickable */
        }

        .hero-static-content .container {
            pointer-events: auto;
        }

        /* Re-enable button clicks */

        .hero-static-content h2 span {
            color: #ff6600;
            font-weight: bold;
        }

        .btn-orange {
            background: #ff6600;
            color: white;
            border: none;
            padding: 12px 30px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: 600;
        }

        /* Background Slider */
        .myHeroSlider {
            position: relative;
            width: 100%;
            
        }

        .swiper-slide {
            background-size: cover;
            background-position: center;
            filter: brightness(0.5);
            /* Automatically darkens background images for text legibility */
        }

       
        .swiper-button-next,
        .swiper-button-prev {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            transition: 0.3s ease;
        }

        .swiper-button-next:after,
        .swiper-button-prev:after {
            font-size: 18px;
            font-weight: bold;
        }

        .swiper-button-next:hover,
        .swiper-button-prev:hover {
            background: #ff6600;
            color: white !important;
        }
    </style>
</head>

<body>
    <section class="hero-wrapper">

        <div class="hero-static-content">
            <div class="container">
                <h2>WELCOME TO <span>MAXIMO INTERNATIONAL</span></h2>
                <h1>The Official ALIBABA.COM CHANNEL PARTNER</h1>
                <p>Empowering Bangladeshi Businesses for Global Trade Excellence.</p>
                <div class="hero-btns">
                    <button class="btn-orange">HOW WE WORK</button>
                    <button class="btn-outline">CONTACT US</button>
                </div>
            </div>
        </div>

        <div class="swiper myHeroSlider">
            <div class="swiper-wrapper">
                <div class="swiper-slide" style="background-image: url('assets/img/news.jpg');"></div>
                <div class="swiper-slide"
                    style="background-image: url(assets/img/b511b8cc-27ce-4964-85b2-a33226e879a0\ \(1\).jpg);">
                </div>
                <div class="swiper-slide"
                    style="background-image: url('assets/img/event1.jpg');">
                </div>
            </div>

            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.myHeroSlider', {
  loop: true,
  effect: 'fade', // Fade is more professional for fixed text
  fadeEffect: { crossFade: true },
  speed: 1500, // Smooth transition speed
  autoplay: {
    delay: 5000,
    disableOnInteraction: false,
  },
  navigation: {
    nextEl: '.swiper-button-next',
    prevEl: '.swiper-button-prev',
  },
  pagination: {
    el: '.swiper-pagination',
    clickable: true,
  },
  keyboard: {
    enabled: true, // Enables Arrow Key control
  },
});
    </script>
</body>

</html>
